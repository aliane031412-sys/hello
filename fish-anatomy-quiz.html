<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fish Anatomy Quiz Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 0.95em;
            opacity: 0.9;
        }

        .content {
            padding: 40px 30px;
            min-height: 400px;
        }

        /* Start Screen */
        .start-screen {
            text-align: center;
        }

        .start-screen h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .start-screen p {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
            font-size: 1em;
        }

        .difficulty-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }

        .difficulty-btn {
            padding: 15px 25px;
            font-size: 1em;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
        }

        .difficulty-btn.easy {
            background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
            color: #333;
        }

        .difficulty-btn.medium {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            color: #333;
        }

        .difficulty-btn.hard {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            color: #333;
        }

        .difficulty-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        /* Quiz Screen */
        .quiz-screen {
            display: none;
        }

        .progress-bar {
            background: #e0e0e0;
            height: 8px;
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            transition: width 0.3s ease;
            border-radius: 10px;
        }

        .question-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            color: #667eea;
            font-weight: 600;
        }

        .question-text {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .option-btn {
            padding: 15px 20px;
            background: #f5f7fa;
            border: 2px solid #dee2e6;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1em;
            text-align: left;
            transition: all 0.3s ease;
            color: #333;
            font-weight: 500;
        }

        .option-btn:hover:not(:disabled) {
            background: #e9ecef;
            border-color: #667eea;
            transform: translateX(5px);
        }

        .option-btn.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .option-btn.correct {
            background: #84fab0;
            border-color: #84fab0;
            color: #333;
        }

        .option-btn.incorrect {
            background: #fa8072;
            border-color: #fa8072;
            color: white;
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        .feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
            font-weight: 500;
        }

        .feedback.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        .feedback.correct {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .feedback.incorrect {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .next-btn {
            margin-top: 25px;
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s ease;
            display: none;
            width: 100%;
        }

        .next-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .next-btn.show {
            display: block;
        }

        /* Results Screen */
        .results-screen {
            display: none;
            text-align: center;
        }

        .score-display {
            font-size: 3em;
            color: #667eea;
            font-weight: bold;
            margin: 30px 0;
        }

        .score-message {
            font-size: 1.5em;
            color: #333;
            margin-bottom: 20px;
        }

        .score-details {
            background: #f5f7fa;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            color: #666;
        }

        .score-details p {
            margin: 10px 0;
            font-size: 1.05em;
        }

        .restart-btn {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-top: 20px;
            width: 100%;
        }

        .restart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .emoji {
            font-size: 4em;
            margin: 20px 0;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.5em;
            }

            .content {
                padding: 25px 20px;
            }

            .question-text {
                font-size: 1.1em;
            }

            .score-display {
                font-size: 2.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🐠 Fish Anatomy Quiz 🐟</h1>
            <p>Test your knowledge about fish body and tail shapes!</p>
        </div>

        <div class="content">
            <!-- Start Screen -->
            <div class="start-screen" id="startScreen">
                <h2>Welcome to the Fish Anatomy Quiz!</h2>
                <p>Choose your difficulty level and answer questions about fish body shapes, tail shapes, and their functions. Each correct answer earns points!</p>
                <div class="difficulty-buttons">
                    <button class="difficulty-btn easy" onclick="startQuiz('easy')">Easy (5 pts)</button>
                    <button class="difficulty-btn medium" onclick="startQuiz('medium')">Medium (10 pts)</button>
                    <button class="difficulty-btn hard" onclick="startQuiz('hard')">Hard (15 pts)</button>
                </div>
            </div>

            <!-- Quiz Screen -->
            <div class="quiz-screen" id="quizScreen">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="question-info">
                    <span id="questionNumber">Question 1 of 10</span>
                    <span id="scoreDisplay">Score: 0</span>
                </div>
                <div class="question-text" id="questionText"></div>
                <div class="options" id="optionsContainer"></div>
                <div class="feedback" id="feedback"></div>
                <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next Question</button>
            </div>

            <!-- Results Screen -->
            <div class="results-screen" id="resultsScreen">
                <h2>Quiz Complete!</h2>
                <div class="emoji" id="resultEmoji">🎉</div>
                <div class="score-message" id="scoreMessage"></div>
                <div class="score-display" id="finalScore"></div>
                <div class="score-details" id="scoreDetails"></div>
                <button class="restart-btn" onclick="restartQuiz()">Play Again</button>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            {
                question: "Which fish body shape is best for fast swimming in open water?",
                options: ["Fusiform", "Compressiform", "Depressiform", "Filiform"],
                correct: 0,
                explanation: "Fusiform is the streamlined, torpedo-shaped body perfect for fast open-water swimming, like tuna."
            },
            {
                question: "A tautog has which body shape?",
                options: ["Fusiform", "Compressiform", "Depressiform", "Filiform"],
                correct: 1,
                explanation: "Tautog is compressiform (flattened side-to-side), allowing quick movement and turning for short distances."
            },
            {
                question: "Which body shape allows a fish to glide close to the bottom like a flying bird?",
                options: ["Filiform", "Compressiform", "Depressiform", "Fusiform"],
                correct: 2,
                explanation: "Depressiform (flattened top-to-bottom) allows fish like skates to glide along the bottom."
            },
            {
                question: "Pipefish move through water using which body shape?",
                options: ["Fusiform", "Depressiform", "Filiform", "Compressiform"],
                correct: 2,
                explanation: "Pipefish have a filiform (long, slender) body that allows them to slither through water like a snake."
            },
            {
                question: "Which tail shape provides the most acceleration and maneuverability but creates more drag?",
                options: ["Forked", "Lunate", "Rounded", "Truncate"],
                correct: 2,
                explanation: "Rounded tail has a large surface area for excellent acceleration and maneuvering, but creates more drag."
            },
            {
                question: "A lunate (crescent-shaped) tail is best for:",
                options: ["Short-distance acceleration", "Very fast, long-distance swimming", "Bottom-dwelling maneuvers", "Precise turning movements"],
                correct: 1,
                explanation: "Lunate tails are designed for very fast, long-distance swimming with less drag, but with decreased maneuverability."
            },
            {
                question: "Which tail shape provides good acceleration with less drag than a rounded tail?",
                options: ["Truncate", "Forked", "Emarginate", "Rounded"],
                correct: 1,
                explanation: "Forked tails have less surface area than rounded, providing good acceleration and maneuverability with less drag."
            },
            {
                question: "The truncate tail is effective for:",
                options: ["Long-distance, high-speed swimming", "Acceleration and maneuverability with less drag than rounded", "Precise maneuvering in tight spaces", "Gliding along the bottom"],
                correct: 1,
                explanation: "Truncate (squared-off) tails provide effective acceleration and maneuverability while reducing drag compared to rounded tails."
            },
            {
                question: "An emarginate tail balances which two factors?",
                options: ["Acceleration and drag", "Speed and maneuverability", "Thrust and surface area", "Body shape and fin position"],
                correct: 1,
                explanation: "An emarginate (slightly indented) tail balances speed and maneuverability by being somewhere between rounded and forked shapes."
            },
            {
                question: "Which body shape would be LEAST suitable for fast open-water swimming?",
                options: ["Fusiform", "Filiform", "Compressiform", "All are equally suitable"],
                correct: 1,
                explanation: "Filiform is best for slithering movements, while fusiform is the streamlined shape designed for fast open-water swimming."
            }
        ];

        let currentQuestion = 0;
        let score = 0;
        let difficulty = 'easy';
        let answered = false;
        const pointValues = { easy: 5, medium: 10, hard: 15 };

        function startQuiz(level) {
            difficulty = level;
            currentQuestion = 0;
            score = 0;
            answered = false;

            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('quizScreen').style.display = 'block';
            document.getElementById('resultsScreen').style.display = 'none';

            loadQuestion();
        }

        function loadQuestion() {
            const question = questions[currentQuestion];
            document.getElementById('questionText').textContent = question.question;
            document.getElementById('questionNumber').textContent = `Question ${currentQuestion + 1} of ${questions.length}`;
            document.getElementById('scoreDisplay').textContent = `Score: ${score}`;

            const progress = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';

            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';

            question.options.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = option;
                btn.onclick = () => selectAnswer(index, btn);
                optionsContainer.appendChild(btn);
            });

            document.getElementById('feedback').classList.remove('show', 'correct', 'incorrect');
            document.getElementById('nextBtn').classList.remove('show');
            answered = false;
        }

        function selectAnswer(index, btnElement) {
            if (answered) return;

            answered = true;
            const question = questions[currentQuestion];
            const allOptions = document.querySelectorAll('.option-btn');

            allOptions.forEach((btn, i) => {
                if (i === question.correct) {
                    btn.classList.add('correct');
                } else if (i === index && index !== question.correct) {
                    btn.classList.add('incorrect');
                }
                btn.disabled = true;
            });

            const feedback = document.getElementById('feedback');
            feedback.classList.add('show');

            if (index === question.correct) {
                feedback.classList.add('correct');
                feedback.textContent = '✓ Correct! ' + question.explanation;
                score += pointValues[difficulty];
                document.getElementById('scoreDisplay').textContent = `Score: ${score}`;
            } else {
                feedback.classList.add('incorrect');
                feedback.textContent = '✗ Incorrect! ' + question.explanation;
            }

            document.getElementById('nextBtn').classList.add('show');
        }

        function nextQuestion() {
            currentQuestion++;

            if (currentQuestion < questions.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('quizScreen').style.display = 'none';
            document.getElementById('resultsScreen').style.display = 'block';

            const totalPoints = questions.length * pointValues[difficulty];
            const percentage = (score / totalPoints) * 100;

            document.getElementById('finalScore').textContent = `${score} / ${totalPoints} points`;

            let message, emoji;
            if (percentage === 100) {
                message = "Perfect Score! 🌟 You're a fish anatomy expert!";
                emoji = "🏆";
            } else if (percentage >= 80) {
                message = "Excellent! 🎊 You know your fish shapes!";
                emoji = "⭐";
            } else if (percentage >= 60) {
                message = "Good Job! 👍 Keep learning about fish!";
                emoji = "😊";
            } else if (percentage >= 40) {
                message = "Not Bad! 💪 Try again to improve!";
                emoji = "🤔";
            } else {
                message = "Keep Practicing! 📚 You'll do better next time!";
                emoji = "🐟";
            }

            document.getElementById('scoreMessage').textContent = message;
            document.getElementById('resultEmoji').textContent = emoji;

            const accuracy = Math.round(percentage);
            document.getElementById('scoreDetails').innerHTML = `
                <p><strong>Difficulty:</strong> ${difficulty.charAt(0).toUpperCase() + difficulty.slice(1)}</p>
                <p><strong>Accuracy:</strong> ${accuracy}%</p>
                <p><strong>Questions Correct:</strong> ${Math.round(score / pointValues[difficulty])} out of ${questions.length}</p>
            `;
        }

        function restartQuiz() {
            document.getElementById('startScreen').style.display = 'block';
            document.getElementById('quizScreen').style.display = 'none';
            document.getElementById('resultsScreen').style.display = 'none';
            currentQuestion = 0;
            score = 0;
            answered = false;
        }
    </script>
</body>
</html>
